<!-- @dsCard group="Pipeline" name="Data-Bus Connector & Status" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Super Human · Connector</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0a0a0f; --surface:#111118; --border:#2a2a3a; --accent:#00d4ff; --accent2:#7c3aed; --text:#e8e8f0; --text-muted:#6b6b80; --success:#22c55e; --warning:#f59e0b; --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); padding:32px; }
  .lbl { font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:.08em; text-transform:uppercase; margin:0 0 14px; }
  .connector { width:140px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .line { position:relative; width:100%; height:2px; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .packet { position:absolute; top:50%; left:0; width:8px; height:8px; border-radius:50%; background:var(--accent); transform:translate(-50%,-50%); box-shadow:0 0 8px var(--accent); animation:travel 1.1s linear infinite; }
  @keyframes travel { from{left:0} to{left:100%} }
  .clabel { font-family:var(--mono); font-size:10px; color:var(--text-muted); }
  .dots { display:flex; gap:34px; align-items:center; margin-top:8px; }
  .d { display:flex; flex-direction:column; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; color:var(--text-muted); }
  .dot { width:11px; height:11px; border-radius:50%; }
  .dot.idle{background:#2a2a3a} .dot.running{background:var(--accent);box-shadow:0 0 0 4px rgba(0,212,255,.18)} .dot.done{background:var(--success)}
  .badges { display:flex; gap:12px; margin-top:8px; }
  .badge { font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; border-radius:4px; padding:3px 8px; }
  .badge.ph { color:var(--warning); border:1px solid rgba(245,158,11,.4); background:rgba(245,158,11,.08); }
  .badge.op { color:var(--success); border:1px solid rgba(34,197,94,.4); background:rgba(34,197,94,.08); }
  .badge.live { color:var(--accent); border:1px solid rgba(0,212,255,.4); background:rgba(0,212,255,.08); }
</style>
</head>
<body>
  <p class="lbl">Data-bus connector (flowing)</p>
  <div class="connector">
    <div class="line"><span class="packet"></span></div>
    <span class="clabel">DesignParams</span>
  </div>

  <p class="lbl" style="margin-top:30px">Status dots</p>
  <div class="dots">
    <div class="d"><span class="dot idle"></span>idle</div>
    <div class="d"><span class="dot running"></span>running</div>
    <div class="d"><span class="dot done"></span>done</div>
  </div>

  <p class="lbl" style="margin-top:30px">Integration badges</p>
  <div class="badges">
    <span class="badge live">LIVE</span>
    <span class="badge ph">PLACEHOLDER · Nathan</span>
    <span class="badge op">OPERATOR-PROVIDED</span>
  </div>
</body>
</html>
