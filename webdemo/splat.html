<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArmasAI — Arm in a Gaussian-Splat Room</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0a0f14;
        font-family: -apple-system, Arial, sans-serif;
      }
      #caption {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 10;
        color: #eaf2f8;
        background: rgba(0, 0, 0, 0.5);
        padding: 12px 16px;
        border-radius: 10px;
        line-height: 1.55;
        font-size: 14px;
        max-width: 480px;
      }
      #caption b {
        color: #6fe6a0;
      }
      #caption .sub {
        color: #9fb0bd;
        font-size: 12px;
      }
      kbd {
        background: #1c2730;
        border: 1px solid #34434f;
        border-radius: 4px;
        padding: 0 5px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="caption">
      <div>
        <b>ArmasAI</b> — prosthesis arm inside the real room (3D Gaussian
        Splatting)
      </div>
      <div class="sub" id="sub">loading splat + arm…</div>
      <div class="sub">
        align splat: <kbd>WASD</kbd>/<kbd>R</kbd><kbd>F</kbd> move · <kbd>Q</kbd
        ><kbd>E</kbd> yaw · <kbd>Z</kbd><kbd>X</kbd> scale · <kbd>P</kbd> print
        transform
      </div>
    </div>
    <!-- local three (shared by OrbitControls + the splat lib) + CDN splat lib -->
    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/",
          "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js"
        }
      }
    </script>
    <script type="module" src="./src/splat.js"></script>
  </body>
</html>
